<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AG ROBOTICS — Piezas a medida, robótica e impresión 3D</title>
<meta name="description" content="Taller de fabricación digital: piezas a medida en PLA/PETG/ABS, diseño en SolidWorks y proyectos de robótica.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ===========================================================
   FORJA3D — Tokens
   Paleta: azul de plano (fondo), líneas cian, papel/acero claro,
   naranja de advertencia como acento de acción, grafito para texto.
=========================================================== */
:root {
  --navy-950: #0b1f33;
  --navy-900: #0f2a44;
  --navy-800: #15385a;
  --line-cyan: #7cc4ff;
  --line-cyan-dim: rgba(124, 196, 255, 0.35);
  --paper: #eef1f4;
  --paper-dim: #dfe4e9;
  --graphite: #16202b;
  --graphite-soft: #4b5a68;
  --accent: #ff6a1f;
  --accent-dim: #ffb08a;
  --ok: #3fbf7f;

  --font-display: "Barlow Condensed", sans-serif;
  --font-body: "IBM Plex Sans", sans-serif;
  --font-mono: "IBM Plex Mono", monospace;

  --radius: 2px;
  --border: 1px solid rgba(255, 255, 255, 0.14);
}

* { box-sizing: border-box; }

/* ---------- Logo de fondo (watermark) ---------- */
.logo-watermark {
  position: fixed;
  inset: 0;
  z-index: -1;
  background-repeat: no-repeat;
  background-position: center 30%;
  background-size: min(70vw, 640px);
  opacity: 0.18;
  pointer-events: none;
  display: flex;
  justify-content: center;
  align-items: center;
}

.logo-watermark img {
  max-width: min(70vw, 640px);
  height: auto;
  filter: grayscale(100%) contrast(120%);
}

.warranty-note {
  margin-top: 18px;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--ok);
  letter-spacing: 0.02em;
}

html { scroll-behavior: smooth; }

body {
  margin: 0;
  background: var(--paper);
  color: var(--graphite);
  font-family: var(--font-body);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.wrap {
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 24px;
}

a { color: inherit; }

img { max-width: 100%; display: block; }

.accent { color: var(--accent); }

/* ---------- Headings ---------- */
h1, h2, h3 {
  font-family: var(--font-display);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.01em;
  margin: 0;
  line-height: 1.05;
}

h1 { font-size: clamp(2.4rem, 6vw, 3.8rem); }
h2 { font-size: clamp(1.9rem, 4.5vw, 2.6rem); margin-bottom: 8px; }

.eyebrow {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--graphite-soft);
  margin: 0 0 10px;
}

.section-sub {
  max-width: 60ch;
  color: var(--graphite-soft);
  margin: 0 0 40px;
}

/* ---------- Header / nav ---------- */
.site-header {
  position: sticky;
  top: 0;
  z-index: 40;
  background: var(--navy-950);
  border-bottom: var(--border);
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--paper);
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.brand-mark {
  color: var(--line-cyan);
  font-size: 1.2rem;
}

.nav {
  display: flex;
  gap: 22px;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.nav a {
  color: var(--paper);
  text-decoration: none;
  opacity: 0.75;
  border-bottom: 1px solid transparent;
  padding-bottom: 3px;
  transition: opacity 0.15s, border-color 0.15s;
}

.nav a:hover, .nav a:focus-visible { opacity: 1; border-color: var(--line-cyan); }

/* ---------- Hero ---------- */
.hero {
  position: relative;
  background: var(--navy-950);
  color: var(--paper);
  overflow: hidden;
  padding: 72px 0 88px;
}

.blueprint-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--line-cyan-dim) 1px, transparent 1px),
    linear-gradient(90deg, var(--line-cyan-dim) 1px, transparent 1px);
  background-size: 42px 42px;
  opacity: 0.12;
  pointer-events: none;
}

.hero-inner {
  position: relative;
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 56px;
  align-items: center;
}

.hero-sub {
  color: rgba(238, 241, 244, 0.72);
  max-width: 52ch;
  margin: 20px 0 32px;
  font-size: 1.02rem;
}

.hero-cta { display: flex; gap: 14px; flex-wrap: wrap; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 0.82rem;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  text-decoration: none;
  padding: 13px 22px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  cursor: pointer;
  transition: transform 0.12s ease, background 0.15s, border-color 0.15s;
}

.btn:active { transform: translateY(1px); }

.btn-primary {
  background: var(--accent);
  color: #1a1206;
  font-weight: 600;
}
.btn-primary:hover { background: var(--accent-dim); }

.btn-ghost {
  background: transparent;
  color: var(--paper);
  border-color: rgba(238, 241, 244, 0.35);
}
.btn-ghost:hover { border-color: var(--line-cyan); color: var(--line-cyan); }

/* ---------- Titleblock drawing card in hero ---------- */
.titleblock {
  border: 1px solid var(--line-cyan-dim);
  background: rgba(238, 241, 244, 0.03);
  padding: 20px;
}

.titleblock-drawing {
  color: var(--line-cyan);
  display: flex;
  justify-content: center;
  padding: 8px 0 16px;
}

.gear-svg { width: 100%; max-width: 220px; height: auto; }
.dim-label { font-family: var(--font-mono); font-size: 10px; fill: var(--line-cyan); }

.titleblock-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--line-cyan-dim);
}

.titleblock-meta div {
  padding: 10px 10px 10px 0;
  border-bottom: 1px solid var(--line-cyan-dim);
}
.titleblock-meta div:nth-child(odd) { border-right: 1px solid var(--line-cyan-dim); padding-left: 4px; }

.titleblock-meta span {
  display: block;
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  color: rgba(238, 241, 244, 0.5);
  margin-bottom: 2px;
}
.titleblock-meta strong {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--paper);
}
.titleblock-meta .stamp { color: var(--ok); }

/* ---------- Sections ---------- */
.section { padding: 84px 0; }
.section-alt { background: var(--paper-dim); }

/* ---------- Catalog ---------- */
.catalog-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
}

.part-card {
  background: #fff;
  border: 1px solid rgba(22, 32, 43, 0.12);
  padding: 18px;
  position: relative;
}

.part-card::before {
  content: attr(data-code);
  position: absolute;
  top: 12px;
  right: 14px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--graphite-soft);
}

.part-thumb {
  width: 100%;
  aspect-ratio: 4 / 3;
  background: var(--paper-dim);
  border: 1px dashed rgba(22, 32, 43, 0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.1rem;
  margin-bottom: 14px;
}

.part-card h3 {
  font-size: 1.15rem;
  text-transform: none;
  margin-bottom: 4px;
}

.part-specs {
  font-family: var(--font-mono);
  font-size: 0.76rem;
  color: var(--graphite-soft);
  margin: 0 0 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px 10px;
}

.part-specs span {
  background: var(--paper-dim);
  padding: 2px 6px;
}

.part-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 14px;
}

.part-price {
  font-family: var(--font-mono);
  font-weight: 600;
}

.part-link {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  text-decoration: none;
  color: var(--navy-800);
  border-bottom: 1px solid var(--accent);
}

/* ---------- Order form ---------- */
.order-form {
  max-width: 640px;
  background: #fff;
  border: 1px solid rgba(22, 32, 43, 0.12);
  padding: 32px;
}

.form-row { margin-bottom: 18px; }

.form-row-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

label {
  display: block;
  font-family: var(--font-mono);
  font-size: 0.74rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--graphite-soft);
  margin-bottom: 6px;
}

input, select, textarea {
  width: 100%;
  font-family: var(--font-body);
  font-size: 0.95rem;
  padding: 11px 12px;
  border: 1px solid rgba(22, 32, 43, 0.25);
  border-radius: var(--radius);
  background: var(--paper);
  color: var(--graphite);
}

input:focus-visible, select:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--navy-800);
  outline-offset: 1px;
}

textarea { resize: vertical; }

.form-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.form-actions .btn-primary { background: var(--ok); color: #06231a; }
.form-actions .btn-primary:hover { background: #63d29b; }
.form-actions .btn-ghost { border-color: rgba(22, 32, 43, 0.3); color: var(--graphite); }
.form-actions .btn-ghost:hover { border-color: var(--navy-800); }

.form-note {
  font-size: 0.8rem;
  color: var(--graphite-soft);
  margin-top: 14px;
}

/* ---------- Portfolio ---------- */
.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 22px;
}

.project-card {
  border: 1px solid rgba(22, 32, 43, 0.12);
  background: #fff;
}

.project-media {
  aspect-ratio: 16 / 10;
  background: var(--navy-900);
  color: var(--line-cyan);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.4rem;
}

.project-body { padding: 18px; }

.project-body h3 { font-size: 1.2rem; text-transform: none; margin-bottom: 6px; }
.project-body p { color: var(--graphite-soft); font-size: 0.92rem; margin: 0 0 12px; }

.project-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.project-tags span {
  border: 1px solid rgba(22, 32, 43, 0.2);
  padding: 3px 7px;
  color: var(--graphite-soft);
}

/* ---------- Footer ---------- */
.footer {
  background: var(--navy-950);
  color: var(--paper);
  padding: 56px 0 0;
}

.footer-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  padding-bottom: 40px;
  border-bottom: 1px solid rgba(238, 241, 244, 0.14);
}

.footer-block p {
  margin-top: 10px;
  color: rgba(238, 241, 244, 0.65);
  max-width: 40ch;
}

.footer-titleblock div {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(238, 241, 244, 0.14);
  font-family: var(--font-mono);
  font-size: 0.85rem;
}

.footer-titleblock span {
  color: rgba(238, 241, 244, 0.5);
  text-transform: uppercase;
  font-size: 0.68rem;
  letter-spacing: 0.08em;
}

.footer-legal {
  padding: 18px 24px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: rgba(238, 241, 244, 0.5);
}

/* ---------- Responsive ---------- */
@media (max-width: 860px) {
  .hero-inner { grid-template-columns: 1fr; }
  .nav { display: none; }
  .footer-inner { grid-template-columns: 1fr; }
  .form-row-split { grid-template-columns: 1fr; }
}

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  .btn { transition: none; }
}

</style>
</head>
